let openPost = null;
let copiedId = null;
let copyTimeout = null;

function fmt(n){ return n>0 ? Number(n).toLocaleString('th-TH') + ' บาท' : '—'; }
function disc(o,s){ if(!o||!s||o<=s) return null; return Math.round((o-s)/o*100); }
function getPrice(pid){ return prices.find(p=>p.id===pid); }

function buildText(post){
  const p = post.pid ? getPrice(post.pid) : null;
  const disc2 = p ? disc(p.orig,p.sale) : null;
  let priceBlock = '';
  if(p && p.sale>0){
    priceBlock = '\n\n💰 ราคาพิเศษ!';
    if(p.orig>0 && p.orig>p.sale) priceBlock += '\nราคาปกติ ' + fmt(p.orig) + ' ← ขีดทับ';
    priceBlock += '\n🔥 ราคาลด: ' + fmt(p.sale);
    if(disc2) priceBlock += ' (ลด '+disc2+'%)';
  } else if(!post.pid){
    priceBlock = '\n\n📩 สอบถามราคาแพ็คเกจ inbox ได้เลยครับ!';
  } else {
    priceBlock = '\n\n📩 สอบถามราคา inbox ได้เลยครับ!';
  }
  return post.body + priceBlock + '\n\n📞 ติดต่อสอบถาม/สั่งซื้อ: inbox หรือโทรหาเราได้เลย!';
}

function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-posts').style.display = tab==='posts'?'block':'none';
  document.getElementById('tab-prices').style.display = tab==='prices'?'block':'none';
}

function togglePost(id){
  openPost = openPost===id ? null : id;
  renderPosts();
}

function copyText(id, text){
  navigator.clipboard.writeText(text).catch(()=>{});
  if(copyTimeout) clearTimeout(copyTimeout);
  copiedId = id;
  renderPosts();
  copyTimeout = setTimeout(()=>{ copiedId=null; renderPosts(); }, 2000);
}

function renderPosts(){
  const container = document.getElementById('tab-posts');
  container.innerHTML = posts.map(post=>{
    const p = post.pid ? getPrice(post.pid) : null;
    const d = p ? disc(p.orig,p.sale) : null;
    const isOpen = openPost===post.id;
    const fullText = buildText(post);

    let priceHtml = '';
    if(p && p.sale>0){
      priceHtml = `<div class="price-tag">${p.orig>0&&p.orig>p.sale?`<span class="price-orig">${fmt(p.orig)}</span>`:''}${fmt(p.sale)}${d?`<span class="badge">-${d}%</span>`:''}</div>`;
    } else {
      priceHtml = `<div style="font-size:12px;color:var(--color-text-tertiary,#999);margin-top:2px">${post.pid?'ยังไม่ได้กรอกราคา':'สอบถามราคา'}</div>`;
    }

    return `<div class="card">
      <div class="card-header" onclick="togglePost(${post.id})">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          <span style="font-size:18px">${post.emoji}</span>
          <div style="min-width:0">
            <div class="post-title">โพส ${post.id}: ${post.title}</div>
            ${priceHtml}
          </div>
        </div>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>
      ${isOpen?`<div class="card-body">
        <div class="post-text">${escHtml(fullText)}</div>
        <div class="prompt-box">
          <div class="prompt-label">🖼️ Image Prompt สำหรับ AI Image Generator (Midjourney/DALL-E/Ideogram):</div>
          <div class="prompt-text">${escHtml(post.prompt)}</div>
        </div>
        <div class="btn-row">
          <button class="action" onclick="copyText('post-${post.id}',${JSON.stringify(fullText)})">${copiedId==='post-'+post.id?'✓ คัดลอกแล้ว':'📋 คัดลอกข้อความโพส'}</button>
          <button class="action" onclick="copyText('prompt-${post.id}',${JSON.stringify(post.prompt)})">${copiedId==='prompt-'+post.id?'✓ คัดลอกแล้ว':'🖼️ คัดลอก Image Prompt'}</button>
        </div>
      </div>`:''
    }</div>`;
  }).join('');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPrices(){
  const container = document.getElementById('tab-prices');
  container.innerHTML = `<p class="hint">กรอกราคาเพื่อแสดงในโพส — "ราคาปกติ" จะแสดงขีดทับ, "ราคาลด" คือราคา TikTok / ต้นทุน</p>` +
  prices.map(p=>{
    const d = disc(p.orig,p.sale);
    return `<div class="card" style="padding:1rem 1.25rem;margin-bottom:10px">
      <div style="font-weight:500;font-size:14px;margin-bottom:10px">${p.id}. ${p.name}</div>
      <div class="price-row">
        <div>
          <label class="price-label">ราคาปกติ (บาท) — แสดงขีดทับ</label>
          <input type="number" placeholder="เช่น 35000" value="${p.orig||''}" oninput="updatePrice(${p.id},'orig',this.value)">
        </div>
        <div>
          <label class="price-label">ราคาลด / ราคา TikTok (บาท)</label>
          <input type="number" placeholder="เช่น 29000" value="${p.sale||''}" oninput="updatePrice(${p.id},'sale',this.value)">
        </div>
      </div>
      ${p.orig>0&&p.sale>0&&p.orig>p.sale?`<div class="savings">✓ ลด ${d}% — ประหยัด ${fmt(p.orig-p.sale)}</div>`:''}
    </div>`;
  }).join('');
}

function updatePrice(id, field, val){
  const p = prices.find(x=>x.id===id);
  if(p){ p[field] = Number(val)||0; }
  renderPrices();
  if(openPost!==null) renderPosts();
}

renderPosts();
renderPrices();
</script>
